{% extends "base.html" %}

{% block title %}Editar Lançamento - Sistema Financeiro{% endblock %}

{% block content %}
<h1 style="text-align: center; color: white; margin-bottom: 2rem;">Editar Lançamento</h1>

<form method="POST">
    <div class="form-group">
        <label for="type">Tipo</label>
        <select id="type" name="type" required>
            <option value="entrada" {% if transaction.type == 'entrada' %}selected{% endif %}>Entrada (Renda)</option>
            <option value="saída" {% if transaction.type == 'saída' %}selected{% endif %}>Saída (Despesa)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="category_id">Categoria</label>
        <select id="category_id" name="category_id" required>
            {% for category in categories %}
            <option value="{{ category.id }}" {% if category.id == transaction.category_id %}selected{% endif %}>{{ category.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label for="value">Valor (R$)</label>
        <input type="number" id="value" name="value" step="0.01" required value="{{ transaction.value }}">
    </div>
    
    <div class="form-group">
        <label for="description">Descrição</label>
        <textarea id="description" name="description" rows="3">{{ transaction.description or '' }}</textarea>
    </div>
    
    <div class="form-group">
        <label for="date">Data</label>
        <input type="date" id="date" name="date" required value="{{ transaction.date.strftime('%Y-%m-%d') }}">
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn" style="flex: 1;">Atualizar Lançamento</button>
        <a href="{{ url_for('transactions.list_transactions') }}" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancelar</a>
    </div>
</form>
{% endblock %}

{% extends "base.html" %}

{% block title %}Editar Categoria - Sistema Financeiro{% endblock %}

{% block content %}
<h1 style="text-align: center; color: white; margin-bottom: 2rem;">Editar Categoria</h1>

<form method="POST">
    <div class="form-group">
        <label for="name">Nome da Categoria</label>
        <input type="text" id="name" name="name" required value="{{ category.name }}">
    </div>
    
    <div class="form-group">
        <label for="type">Tipo</label>
        <select id="type" name="type" required>
            <option value="entrada" {% if category.type == 'entrada' %}selected{% endif %}>Entrada (Renda)</option>
            <option value="saída" {% if category.type == 'saída' %}selected{% endif %}>Saída (Despesa)</option>
        </select>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn" style="flex: 1;">Atualizar Categoria</button>
        <a href="{{ url_for('categories.list_categories') }}" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancelar</a>
    </div>
</form>
{% endblock %}

{% extends "base.html" %}

{% block title %}Registrar - Sistema Financeiro{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 3rem auto;">
    <h1 style="text-align: center; color: white; margin-bottom: 2rem;">Registrar</h1>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Registrar</button>
    </form>
    
    <p style="text-align: center; margin-top: 1rem; color: white;">
        Já tem conta? <a href="{{ url_for('auth.login') }}" style="color: #667eea; text-decoration: none;">Faça login aqui</a>
    </p>
</div>
{% endblock %}
